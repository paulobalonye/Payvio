version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: payvio-db
    environment:
      POSTGRES_USER: payvio
      POSTGRES_PASSWORD: payvio_dev_password
      POSTGRES_DB: payvio
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payvio"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: payvio-redis
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
